name: Refresh README preview reference

on:
  push:
    paths:
      - ".github/workflows/refresh-preview-reference.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Reference cache-busted preview
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          old = "examples/preview.svg"
          new = "examples/preview-contiguous-20260720.svg"
          for name in ("README.md", "README.en.md", "README.zh-TW.md"):
              path = Path(name)
              text = path.read_text(encoding="utf-8-sig")
              if old in text:
                  path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          rm .github/workflows/refresh-preview-reference.yml

      - name: Commit README update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.en.md README.zh-TW.md .github/workflows/refresh-preview-reference.yml
          git commit -m "docs: reference latest preview image"
          git push
