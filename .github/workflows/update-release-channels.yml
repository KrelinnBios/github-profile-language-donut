name: Update release channels

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: update-release-channels
  cancel-in-progress: false

jobs:
  update:
    if: ${{ !github.event.release.draft && !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the published release
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Move stable release channels
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Release tag must use stable semantic versioning, for example v1.2.3."
            exit 1
          fi

          major="v${BASH_REMATCH[1]}"
          minor="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          commit_sha="$(git rev-parse HEAD)"

          git push origin "$commit_sha:refs/heads/latest" --force
          git push origin "$commit_sha:refs/heads/$major" --force
          git push origin "$commit_sha:refs/heads/$minor" --force

          echo "latest, $major and $minor now point to $RELEASE_TAG ($commit_sha)."
