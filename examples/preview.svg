<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="615" height="188" viewBox="0 0 615 188" role="img" aria-labelledby="title desc">
  <title id="title">Language distribution donut chart</title>
  <desc id="desc">Language mix across current public repositories: Kotlin 44.4%, HTML 33.7%, JavaScript 17.9%, CSS 3.2%, Python 0.5%, PowerShell 0.3%.</desc>
  <style>
    .label { fill: #24292f; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .percent { fill: #57606a; font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .center-value { fill: #24292f; font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
    .center-label { fill: #24292f; font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-anchor: middle; }
    .bar-track { fill: #d0d7de; opacity: 0.34; }
    .donut-track { stroke: #d0d7de; opacity: 0.20; }
    .segment { fill: none; stroke-width: 22; stroke-linecap: round; }
    @media (prefers-color-scheme: dark) {
      .label, .center-value, .center-label { fill: #f0f6fc; }
      .percent { fill: #8b949e; }
      .bar-track { fill: #30363d; }
      .donut-track { stroke: #30363d; }
    }
  </style>

  <g>
    <circle cx="26.0" cy="30.5" r="5" fill="#7F52FF"/>
    <text class="label" x="44.0" y="34.5">Kotlin</text>
    <text class="percent" x="183.0" y="34.5" text-anchor="end">44.4%</text>
    <circle cx="48.0" cy="45.0" r="3" fill="#7F52FF" />
    <circle cx="26.0" cy="62.5" r="5" fill="#E34F26"/>
    <text class="label" x="44.0" y="66.5">HTML</text>
    <text class="percent" x="183.0" y="66.5" text-anchor="end">33.7%</text>
    <circle cx="48.0" cy="77.0" r="3" fill="#E34F26" />
    <circle cx="26.0" cy="94.5" r="5" fill="#F7DF1E"/>
    <text class="label" x="44.0" y="98.5">JavaScript</text>
    <text class="percent" x="183.0" y="98.5" text-anchor="end">17.9%</text>
    <circle cx="48.0" cy="109.0" r="3" fill="#F7DF1E" />
    <circle cx="26.0" cy="126.5" r="5" fill="#00B8D9"/>
    <text class="label" x="44.0" y="130.5">CSS</text>
    <text class="percent" x="183.0" y="130.5" text-anchor="end">3.2%</text>
    <circle cx="48.0" cy="141.0" r="3" fill="#00B8D9" />
    <circle cx="26.0" cy="158.5" r="5" fill="#22C55E"/>
    <text class="label" x="44.0" y="162.5">Python</text>
    <text class="percent" x="183.0" y="162.5" text-anchor="end">0.5%</text>
    <rect class="bar-track" x="44.0" y="171.5" width="139.0" height="3" rx="1.5"/>
    <rect x="44.0" y="171.5" width="4.00" height="3" rx="1.5" fill="#22C55E"/>
    <circle cx="209.0" cy="30.5" r="5" fill="#EC4899"/>
    <text class="label" x="227.0" y="34.5">PowerShell</text>
    <text class="percent" x="366.0" y="34.5" text-anchor="end">0.3%</text>
    <circle cx="231.0" cy="45.0" r="3" fill="#EC4899" />
  </g>

  <g>
    <circle class="donut-track" cx="508.0" cy="94.0" r="72.0" fill="none" stroke-width="22"/>
    <path class="segment" d="M 508.41 22.00 A 72.00 72.00 0 0 1 512.11 22.12" stroke="#22C55E" />
    <circle cx="520.5" cy="164.9" r="11.0" fill="#7F52FF" />
    <circle cx="514.3" cy="165.7" r="11.0" fill="#E34F26" />
    <circle cx="508.0" cy="166.0" r="11.0" fill="#F7DF1E" />
    <circle cx="501.7" cy="165.7" r="11.0" fill="#00B8D9" />
    <circle cx="495.5" cy="164.9" r="11.0" fill="#EC4899" />
  </g>
  <text class="center-value" x="508.0" y="92.0">44.4%</text>
  <text class="center-label" x="508.0" y="113.0">Kotlin</text>
</svg>
