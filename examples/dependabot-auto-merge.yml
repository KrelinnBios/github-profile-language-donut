# Place this file at .github/workflows/dependabot-auto-merge.yml
# Automatically merges Dependabot PRs for the language-donut action
# and triggers chart regeneration.
name: Auto-merge Dependabot PRs

on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --auto ${{ github.event.pull_request.html_url }}
